repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: debug-statements
      - id: check-yaml
        args:
          - --allow-multiple-documents
      - id: end-of-file-fixer
      - id: pretty-format-json
        exclude: \.ipynb$
        args:
          - --autofix
          - --indent
          - "4"
          - --no-sort-keys
  # - repo: https://github.com/astral-sh/ruff-pre-commit
  #   rev: v0.15.2
  #   hooks:
  #     - id: ruff # Run the linter.
  #       types_or: [python]
  #       args: [--fix]
  #     - id: ruff-format # Run the formatter.
  #       types_or: [python]
  - repo: local
    hooks:
      - id: check-timescale
        name: "Check that all .sv files contain timescale"
        entry: bash
        language: system
        types:
          - system-verilog
        files: \.sv$
        args:
          - -c
          - |
            for file in "$@"; do
              if ! grep -q "\`timescale" "$file"; then
                echo "ERROR: $file does not contain a \`timescale directive."
                exit 1
              fi
            done
  - repo: https://github.com/google/addlicense
    rev: v1.2.0
    hooks:
      - id: addlicense
        args:
          - "-f"
          - "license_header.txt"
          - "-ignore"
          - "fusesoc/designs/cross/common/rtl_external/**"
          - "-ignore"
          - "fusesoc/designs/sha3/rtl_external/**"
          - "-ignore"
          - "fusesoc/test/**"
          - "-ignore"
          - "fusesoc/designs/misc/ctypes/**"
          - "-ignore"
          - "**/__init__.py"
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6
    hooks:
      - id: insert-license
        name: Insert license in FuseSoc core and YAML files
        files: \.(core|yaml)$
        args:
          - --license-filepath
          - license_header.txt
          - --use-current-year
          - --insert-license-after-regex
          - "CAPI=2:"
          - --no-extra-eol
      - id: insert-license
        name: Insert license in TCL and XDC files
        files: \.(tcl|xdc)$
        args:
          - --license-filepath
          - license_header.txt
          - --use-current-year
          - --no-extra-eol
          - --comment-style=#
      - id: insert-license
        name: Insert license in SystemVerilog Header and Verilator Waiver files
        files: \.(svh|vlt)$
        args:
          - --license-filepath
          - license_header.txt
          - --use-current-year
          - --no-extra-eol
          - --comment-style=//
      - id: insert-license
        name: Insert license in VHDL files
        files: \.vhd$
        args:
          - --license-filepath
          - license_header.txt
          - --use-current-year
          - --no-extra-eol
          - --comment-style=--
