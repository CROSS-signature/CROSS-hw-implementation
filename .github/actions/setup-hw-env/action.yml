name: "Setup Hardware Environment"
description: "Checks out the code and sets up the micromamba environment for hardware tests."

runs:
  using: "composite"
  steps:
    - uses: mamba-org/setup-micromamba@v2
      with:
        environment-file: environment.yml
        init-shell: bash
        cache-environment: true
        cache-environment-key: ${{ runner.os }}-mamba-${{ hashFiles('environment.yml') }}
