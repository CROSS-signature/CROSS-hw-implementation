# run locally with `act --var REGISTRY_URL --var REGISTRY_USER -s REGISTRY_TOKEN --container-daemon-socket $XDG_RUNTIME_DIR/podman/podman.sock -W .github/workflows/build_container_image.yaml --rm`
# Cross-compiling requires qemu-user-static-* binfmt interpreter
name: "Container image creation"

on:
  push:
    branches:
      - master
    paths:
      - Containerfile
  schedule:
    - cron: "0 22 1,15 * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build_image:
    name: Build container images
    runs-on: ubuntu-latest
    container:
      image: docker.io/debian:latest
    steps:
      - name: Install missing packages
        run: |
          apt update
          DEBIAN_FRONTEND=noninteractive apt install --no-install-recommends -y \
          buildah \
          podman \
          containers-storage \
          libvshadow-utils \
          ca-certificates \
          nodejs \
          git
          cp /usr/share/containers/storage.conf /etc/containers/storage.conf
          sed -i -e 's|driver = "overlay"|driver = "vfs"|' /etc/containers/storage.conf
          podman ps -q # this is required!
          usermod --add-subuids 100000-165535 --add-subgids 100000-165535 root

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image
        id: build-image
        uses: redhat-actions/buildah-build@v2.13
        with:
          image: cross-hw-validation
          tags: latest
          containerfiles: ./Containerfile
          platforms: linux/amd64, linux/arm64
          extra-args: --isolation=chroot

      - name: Push to registry
        if: success() && github.ref == 'refs/heads/master' && github.event_name != 'pull_request' && vars.REGISTRY_URL != ''
        uses: redhat-actions/push-to-registry@v2.8
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: ${{ vars.REGISTRY_URL }}/${{ vars.REGISTRY_USER }}
          username: ${{ vars.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}
