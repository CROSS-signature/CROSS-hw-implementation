name: cross-hw-design

channels:
  - conda-forge

dependencies:
  - python>3.10,<3.13
  - pip
  - compilers
  - ccache # improves performance on re-compilation
  - verilator==5.032 # build HW model
  - fusesoc==2.4.4 # repository manager
  - zlib
  - psutil # DSE parallelism
  - bitarray # HW testbenches
  - tqdm # script dependencies
  - pytest # HW testbenches
  - pytest-xdist # HW testbenches
  - pytest-html==4.2 # HW testbenches
  - ruff # linting and formatting
  - numpy # script dependencies
  - matplotlib # script dependencies
  - pygit2 # DSE reproducibility
  - pre-commit # repo checks
  - scapy # hexdump
  - argcomplete # script dependencies
  - astropy # parsing Vivado result tables
  - pip:
      - cocotb==1.9.2 # HW testbenches
      - cocotb-test==0.2.6 # HW testbenches
      - cocotbext-axi # HW testbenches
      - fastjsonschema # fusesoc dependency
      - galois # arithmetic unit tests
